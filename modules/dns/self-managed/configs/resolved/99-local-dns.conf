# Deploy to:   /etc/systemd/resolved.conf.d/99-local-dns.conf  (new file)
# Apply:       sudo cp ~/build-your-infra/modules/dns/self-managed/configs/resolved/99-local-dns.conf /etc/systemd/resolved.conf.d/99-local-dns.conf
# Module:      dns
# Requires:    none
#
# systemd-resolved drop-in: routes lab.internal queries to local BIND9.
# Parameters modified from baseline:  DNS, Domains

[Resolve]
# Route all lab.internal queries to the local BIND9 instance.
# External names fall through to the system default resolver.
DNS=127.0.0.1
Domains=lab.internal