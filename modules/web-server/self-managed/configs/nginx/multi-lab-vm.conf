# Deploy to:   /etc/nginx/sites-available/multi-lab.conf  (full-file replace)
# Apply:       nginx -t && systemctl reload nginx
# Module:      web-server
# Requires:    hardening/self-managed applied first — UFW, AppArmor, auditd baseline
#
# Nginx HTTPS virtual host with reverse proxy — VM environment, self-signed certificate.
# Parameters modified from baseline:  proxy_pass upstream added
#
# Note:        Replace <upstream_port> with the actual port of the backend service.
#              Upstream must be running before testing — 502 if port is not listening.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:<upstream_port>/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}