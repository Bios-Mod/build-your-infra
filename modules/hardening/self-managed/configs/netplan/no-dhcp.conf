# ================================================================================
# Deploy to:  /etc/systemd/network/10-netplan-enp2s0.network.d/no-dhcp.conf
# Apply:      sudo systemctl daemon-reload && sudo systemctl restart systemd-networkd
# Module:     hardening
# Requires:   none
#
# systemd-networkd drop-in — overrides DHCP=ipv4 generated by Netplan 0.106 bug
# Parameters modified from baseline:  none
#
# Purpose:    Netplan 0.106 (Ubuntu 24.04) generates DHCP=ipv4 in the base
#             systemd-networkd unit even when dhcp4: no is explicitly set in
#             the YAML — a known bug when static addresses coexist with explicit
#             route definitions. This drop-in overrides only the DHCP directive
#             at runtime. The Netplan-generated base file is left untouched and
#             continues to be managed by Netplan.
# Note:       The drop-in directory name mirrors the Netplan-generated unit file
#             name, which includes the interface name. Replace enp2s0 with your
#             actual interface name before deploying.
# ================================================================================

[Network]
DHCP=no