# ============================================================
# Deploy to:  /etc/rsyslog.d/20-ufw.conf
# Apply:      sudo systemctl restart rsyslog
# Module:     hardening
# Requires:   none
#
# Routes UFW kernel messages to a dedicated log file
# Parameters modified from baseline:  none
#
# Note:       Filename prefix 20- ensures this file loads before 50-default.conf.
#             UFW messages are kern.* and would be consumed by the default
#             kern.* rule if this file loaded after it.
# Verify:     sudo tail -f /var/log/ufw.log (generate blocked traffic to test)
# ============================================================

# UFW kernel messages → dedicated file
# Pattern matches [UFW BLOCK], [UFW ALLOW], [UFW LIMIT], etc.
:msg,contains,"[UFW " /var/log/ufw.log
& stop