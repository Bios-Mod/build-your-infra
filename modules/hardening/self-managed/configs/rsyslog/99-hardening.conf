# ============================================================
# Deploy to:  /etc/rsyslog.d/99-hardening.conf
# Apply:      sudo systemctl restart rsyslog
# Module:     hardening
# Requires:   none
#
# Routes Fail2Ban and kernel messages to dedicated log files
# Parameters modified from baseline:  none
#
# Note:       auth.log is already handled by 50-default.conf — do not duplicate
#             that rule here or entries will appear twice.
#             auditd writes directly to /var/log/audit/audit.log via its own
#             daemon. If audisp-syslog is ever enabled, add a routing rule here
#             to avoid audit events landing in the generic syslog.
# ============================================================

# Fail2Ban → dedicated file
if $programname == 'fail2ban' then /var/log/fail2ban.log
& stop

# Kernel messages → dedicated file
kern.*   /var/log/kern.log