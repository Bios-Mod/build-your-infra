# ============================================================
# Deploy to:  /etc/sysctl.d/99-wireguard.conf
# Apply:      sudo sysctl --system
# Module:     hardening
# Requires:   none
#
# Enables kernel IP forwarding — required for WireGuard VPN routing
# Parameters modified from baseline:  net.ipv4.ip_forward 0 → 1
#
# Purpose:    Intentionally separate from 99-z-hardening.conf — ip_forward
#             is a functional requirement for VPN routing, not a hardening
#             parameter. Isolation makes the intent explicit and simplifies
#             removal if WireGuard is deprovisioned.
# ============================================================

# Enable kernel packet forwarding between interfaces.
# Required for WireGuard: routes traffic between wg0 and enp2s0.
# Without this, VPN clients connect but cannot reach the server subnet.
net.ipv4.ip_forward = 1