# ============================================================
# Deploy to:  /etc/fail2ban/fail2ban.d/allowipv6.conf
# Apply:      sudo fail2ban-client reload
# Module:     hardening
# Requires:   none
#
# Suppresses allowipv6 WARNING on every fail2ban-client invocation
# Parameters modified from baseline:  none
#
# Purpose:    allowipv6 ships commented out in fail2ban.conf — this
#             override sets it to auto via the official fail2ban.d/
#             mechanism. fail2ban.conf is never modified directly,
#             ensuring the override survives apt upgrades.
# ============================================================

[Definition]
allowipv6 = auto