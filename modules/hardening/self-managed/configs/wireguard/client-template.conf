# ============================================================
# Deploy to:  /etc/wireguard/wg0.conf  (macOS Homebrew and Linux)
# Apply:      sudo wg-quick up wg0
# Module:     hardening
# Requires:   wg0.conf deployed and running on the server
#
# WireGuard client configuration template — split-tunnel, Quad9 DNS
# Parameters modified from baseline:  none
#
# Note:       Assign a unique IP per client within 10.0.0.0/24 (.2, .3, .4...).
#             AllowedIPs = 10.0.0.0/24 → split tunnel (VPN subnet only).
#             Use 0.0.0.0/0 for full tunnel (all traffic via server).
# ⚠️  Never commit real PrivateKey values — replace with <placeholder> before push.
# ============================================================

[Interface]
Address    = 10.0.0.X/24         # Unique IP per client: .2 (Mac), .3, .4...
PrivateKey = <client-private-key>
DNS        = 9.9.9.9             # Quad9 — applied while tunnel is active

[Peer]
PublicKey           = <server-public-key>
Endpoint            = <server-ip-or-domain>:51820   # EC2: Elastic IP · VM: 192.168.X.X
AllowedIPs          = 10.0.0.0/24   # Split tunnel — only VPN subnet routed through tunnel
                                     # Use 0.0.0.0/0 for full tunnel (all traffic via server)
PersistentKeepalive = 25            # Keepalive in seconds — required behind NAT routers