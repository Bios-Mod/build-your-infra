# ============================================================
# Deploy to:  /etc/wireguard/wg0.conf
# Apply:      sudo wg-quick up wg0 && sudo systemctl enable wg-quick@wg0
# Module:     hardening
# Requires:   net.ipv4.ip_forward=1 (sysctl/99-wireguard.conf)
#
# WireGuard server (hub) — hub-and-spoke VPN, one [Peer] block per client
# Parameters modified from baseline:  none
#
# Reload:     sudo wg-quick down wg0 && sudo wg-quick up wg0
# Perms:      sudo chmod 600 /etc/wireguard/wg0.conf
# Note:       Add one [Peer] block per client device. Each peer requires
#             a unique keypair and a unique IP within 10.0.0.0/24.
#             See configs/wireguard/client-template.conf for client-side config.
# ⚠️  Never commit real PrivateKey values — replace with <placeholder> before push.
#     Generate keys: wg genkey | sudo tee private.key | wg pubkey > public.key
# ============================================================

# Hub address. Peers connect here and reach each other through this server. 
# ip_forward required.

[Interface]
Address    = 10.0.0.1/24    # Hub address.
ListenPort = 51820           # WireGuard listen port (UDP)
PrivateKey = <server-private-key>

# ── Peers ────────────────────────────────────────────────────
# Add one [Peer] block per device that needs access to this server.
# Each peer requires a unique keypair and a unique IP within the VPN subnet.
# See configs/wireguard/client-template.conf for the client-side configuration.

# For a peer to reach another peer through this hub, ip_forward must be
# enabled (configs/sysctl/99-wireguard.conf) and UFW must allow forwarding
# on wg0 (Step 5 — ufw route allow in on wg0 out on wg0).

# Mac
[Peer]
PublicKey  = <mac-public-key>
AllowedIPs = 10.0.0.2/32    # Only traffic from this IP is accepted from this peer

# Add more peers as needed:
# [Peer]
# PublicKey  = <device-public-key>
# AllowedIPs = 10.0.0.X/32