# ============================================================
# Deploy to:  /etc/modprobe.d/disable-unused-protocols.conf
# Apply:      sudo update-initramfs -u
# Module:     hardening
# Requires:   none
#
# Disable unused network protocol kernel modules to reduce attack surface (NETW-3200)
# Parameters modified from baseline:  none
#
# Note:       retcode 1 on modprobe is expected and correct — modules are
#             blocked, not missing.
# Verify:     lsmod | grep -E "dccp|sctp|rds|tipc"
# ============================================================

# dccp — CVE-2017-6074 (use-after-free → root)
install dccp /bin/false

# sctp — recurring CVE history; unused in this lab
install sctp /bin/false

# rds — CVE-2010-3904 (local privilege escalation → root)
install rds  /bin/false

# tipc — cluster IPC protocol; unused in this lab
install tipc /bin/false
