# Deploy to:   /etc/samba/smb.conf
# Apply:       Reference copy only — samba-tool generates this file during provision.
#              To restore after accidental deletion:
#              sudo cp ~/build-your-infra/modules/directory/self-managed/configs/samba/smb.conf /etc/samba/smb.conf
# Module:      directory
# Requires:    directory Step 3 (samba-tool domain provision complete)
#
# Samba 4 AD DC configuration. Generated by samba-tool domain provision.
# Parameters modified from baseline:  realm, workgroup, dns backend, server role
#
# Note:        Do not modify [global] parameters without consulting samba-tool.
#              The dns forwarder points at the upstream resolver for external names.

[global]
    workgroup = MULTILAB
    realm = MULTILAB.INTERNAL
    netbios name = DC01
    server role = active directory domain controller
    dns backend = SAMBA_INTERNAL
    log file = /var/log/samba/log.%m
    log level = 1

[sysvol]
    path = /var/lib/samba/sysvol
    read only = No

[netlogon]
    path = /var/lib/samba/sysvol/multilab.internal/scripts
    read only = No