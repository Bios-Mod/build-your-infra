# Deploy to:   /etc/resolv.conf
# Apply:       sudo cp ~/build-your-infra/modules/directory/self-managed/configs/resolv.conf /etc/resolv.conf
# Module:      directory
# Requires:    dns (BIND9 deployed), directory Step 3 (samba-tool provision complete)
#
# Resolver configuration for the Samba AD DC node.
# Samba DNS (10.0.1.112:53) serves multilab.internal.
# BIND9 (127.0.0.1:53) serves lab.internal and upstream resolution.
# Note: lock with chattr +i after deploying.

search multilab.internal
nameserver 10.0.1.112
nameserver 127.0.0.1