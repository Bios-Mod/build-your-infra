# Deploy to:   /etc/krb5.conf
# Apply:       sudo cp ~/build-your-infra/modules/directory/self-managed/configs/krb5/krb5.conf /etc/krb5.conf
# Module:      directory
# Requires:    directory Step 3 (samba-tool domain provision complete)
#
# Kerberos client configuration for the MULTILAB.INTERNAL realm.
# Parameters modified from baseline:  default_realm, kdc, admin_server set to DC
#
# Note:        This is a reference copy. The authoritative source generated by
#              samba-tool lives at /var/lib/samba/private/krb5.conf.
#              Copy from there after provisioning — do not edit this file manually
#              unless the realm or KDC address changes.

[libdefaults]
    default_realm = MULTILAB.INTERNAL
    dns_lookup_realm = false
    dns_lookup_kdc = true

[realms]
    MULTILAB.INTERNAL = {
        kdc = dc01.multilab.internal
        admin_server = dc01.multilab.internal
    }

[domain_realm]
    .multilab.internal = MULTILAB.INTERNAL
    multilab.internal = MULTILAB.INTERNAL