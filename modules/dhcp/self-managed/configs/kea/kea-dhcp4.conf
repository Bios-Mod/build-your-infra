// Deploy to:   /etc/kea/kea-dhcp4.conf
// Apply:       sudo cp ~/build-your-infra/modules/dhcp/self-managed/configs/kea/kea-dhcp4.conf /etc/kea/kea-dhcp4.conf
// Module:      dhcp
// Requires:    none
//
// Kea DHCPv4 server — subnet 192.168.1.0/24, pool .100-.200, DNS via WireGuard
// Parameters modified from baseline: full replacement of default example config
//
// Purpose:     Dynamic address assignment for the local LAN segment
// Platform:    Ubuntu 24.04 LTS · Local VM (bridged adapter ens160)
// Note:        Reserved IPs should be placed outside the dynamic pool (.100-.200)
//              to prevent pool exhaustion conflicts. Adjust interface name if
//              your bridged adapter is not ens160 (verify with: ip link)
// Verify:      sudo kea-dhcp4 -t /etc/kea/kea-dhcp4.conf
{
    "Dhcp4": {
        "interfaces-config": {
            "interfaces": [ "ens160" ],
            "dhcp-socket-type": "raw"
        },
        "control-socket": {
            "socket-type": "unix",
            "socket-name": "/run/kea/kea4-ctrl-socket"
        },
        "lease-database": {
            "type": "memfile",
            "lfc-interval": 3600,
            "name": "/var/lib/kea/kea-leases4.csv"
        },
        "valid-lifetime": 43200,
        "renew-timer": 21600,
        "rebind-timer": 37800,
        "option-data": [
            {
                "name": "domain-name-servers",
                "data": "172.16.0.1"  // EC2 BIND9 over WireGuard
            },
            {
                "name": "domain-name",
                "data": "lab.internal"
            }
        ],
        "subnet4": [
            {
                "id": 1,
                "subnet": "192.168.1.0/24",
                "pools": [
                    { "pool": "192.168.1.100 - 192.168.1.200" }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "192.168.1.1"
                    }
                ],
                "reservations": [
                    // Example — replace with real MAC and desired IP
                    // Reserved IPs outside pool (.201+) avoid assignment conflicts
                    {
                        "hw-address": "aa:bb:cc:dd:ee:ff",
                        "ip-address": "192.168.1.201",
                        "hostname": "example-host"
                    }
                ]
            }
        ],
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output_options": [
                    {
                        "output": "syslog"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}