# Drop-in override for the Netplan-generated systemd-networkd unit.
#
# Location: /etc/systemd/network/10-netplan-enp2s0.network.d/no-dhcp.conf
# The drop-in directory name mirrors the Netplan-generated unit file name, 
# which includes the interface name. Replace enp2s0 with your actual 
# interface name.
# 
# PURPOSE:
# Netplan 0.106 (Ubuntu 24.04) generates DHCP=ipv4 in the base unit file
# even when dhcp4: no is explicitly set in the YAML — a known bug when
# static addresses coexist with explicit route definitions.
#
# This drop-in overrides only the DHCP directive at runtime, following the
# standard systemd override pattern (.d/ directory). The Netplan-generated
# base file is left untouched and continues to be managed by Netplan.
#
# Apply changes:
#   sudo systemctl daemon-reload
#   sudo systemctl restart systemd-networkd

[Network]
DHCP=no