# ============================================================
# Deploy to : /etc/wireguard/wg0.conf
# Apply     : sudo wg-quick up wg0
#           : sudo systemctl enable wg-quick@wg0
# Reload    : sudo wg-quick down wg0 && sudo wg-quick up wg0
# Perms     : sudo chmod 600 /etc/wireguard/wg0.conf
# ⚠️  Never commit real private keys — replace with <placeholder> before push.
#     Generate keys: wg genkey | sudo tee private.key | wg pubkey > public.key
# ============================================================

[Interface]
Address    = 10.0.0.1/24    # VPN subnet — server is .1, peers are .2, .3, .4...
ListenPort = 51820           # WireGuard listen port (UDP)
PrivateKey = <server-private-key>

# ── Peers ────────────────────────────────────────────────────
# Add one [Peer] block per device that needs access to this server.
# Each peer requires a unique keypair and a unique IP within the VPN subnet.
# See configs/wireguard/client-template.conf for the client-side configuration.

# Mac
[Peer]
PublicKey  = <mac-public-key>
AllowedIPs = 10.0.0.2/32    # Only traffic from this IP is accepted from this peer

# Add more peers as needed:
# [Peer]
# PublicKey  = <device-public-key>
# AllowedIPs = 10.0.0.X/32