# ============================================================
# Source  : /etc/sysctl.d/99-wireguard.conf
# Purpose : Kernel parameters required for WireGuard VPN
# Note    : Intentionally separate from 99-z-hardening.conf —
#           ip_forward is a functional requirement for VPN routing,
#           not a hardening parameter. Keeping it isolated makes
#           the intent explicit and simplifies future removal if
#           WireGuard is deprovisioned.
# Apply   : sudo sysctl --system
# ============================================================

# Enable kernel packet forwarding between interfaces.
# Required for WireGuard: routes traffic between wg0 and enp2s0.
# Without this, VPN clients connect but cannot reach the server subnet.
net.ipv4.ip_forward = 1