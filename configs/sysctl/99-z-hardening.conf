# ============================================================
# Source  : /etc/sysctl.d/99-z-hardening.conf
# Purpose : Kernel hardening parameters — applied at boot via
#           systemd-sysctl and on-demand via 'sysctl --system'
# Note    : Named 99-z-* to load LAST among all sysctl.d files.
#           Exception: /etc/ufw/sysctl.conf loads after this
#           file on every 'ufw reload' — parameters shared with
#           UFW must also be set in configs/ufw/sysctl.conf.
# Apply   : sudo sysctl --system
# ============================================================

# ── NETWORK ──────────────────────────────────────────
# Anti-spoofing protection: verifies that incoming packets
# come through the correct interface according to the route table
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# TCP TIME_WAIT assassination defense (RFC 1337)
# Discards RST packets targeting connections in TIME_WAIT state.
# Prevents an attacker from forcing early port reuse and hijacking the
# subsequent connection. Disabled by default on Linux.
net.ipv4.tcp_rfc1337 = 1

# Disable source routing on all and new interfaces
# Source-routed packets allow the sender to dictate the route — always suspicious
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# SYN flood protection: activates cryptographic cookies on the
# TCP handshake to absorb denial of service attacks
net.ipv4.tcp_syncookies = 1

# Reject ICMP redirect packets — prevents MITM attacks
# where an attacker redirects traffic through their machine
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects — this server is not a router
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore broadcast pings — prevents being used in Smurf attacks
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore malformed ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log packets with impossible or invalid source addresses (martians)
# Complements rp_filter — useful for detecting spoofing attempts
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable full BPF JIT hardening for all users including root
# Mitigates side-channel attacks against JIT-compiled BPF programs
net.core.bpf_jit_harden = 2

# ── KERNEL ───────────────────────────────────────────
# Maximum ASLR: randomizes memory address layout on every process
# Makes memory corruption exploits significantly harder to execute
kernel.randomize_va_space = 2

# Hide kernel pointers in /proc and other pseudo-filesystems
# Level 2 = hidden even for root — maximum restriction
kernel.kptr_restrict = 2

# Restrict access to the kernel ring buffer (dmesg)
# Only root can read it — prevents system information leakage
kernel.dmesg_restrict = 1

# Restrict ptrace: a process can only trace its own children
# Prevents processes from inspecting the memory of unrelated processes
kernel.yama.ptrace_scope = 1

# Disable Magic SysRq key — no use on a headless server
# Could allow forced reboot or process kill from console without authentication
kernel.sysrq = 0

# Restrict perf_events counters to root only
# Unprivileged access to performance counters can leak kernel addresses
kernel.perf_event_paranoid = 3

# Disable BPF program loading for unprivileged users
# BPF has a history of privilege escalation CVEs
# NOTE: value 2 is stricter than CIS L1 (expects 1) — also disables unprivileged
# access to BPF maps. CIS score may flag this as non-compliant; the setting is
# intentionally more restrictive than the benchmark minimum.
kernel.unprivileged_bpf_disabled = 2

# Append PID to core dump filenames — improves forensic traceability
kernel.core_uses_pid = 1

# Disable TTY line discipline autoload
# Reduces kernel attack surface — no serial terminals on this server
dev.tty.ldisc_autoload = 0

# ── FILESYSTEM ───────────────────────────────────────
# Protect against hardlink and symlink attacks
# Prevents a user from creating links to files they do not own
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Protect FIFOs and regular files in sticky directories
# Prevents race condition attacks in world-writable dirs like /tmp
fs.protected_fifos = 2
fs.protected_regular = 2

# Disable core dumps for SUID binaries
# Prevents memory content of privileged processes from being written to disk
fs.suid_dumpable = 0

# ── DEFERRED ─────────────────────────────────────────
# kernel.modules_disabled = 1
# DEFERRED: WireGuard is loaded as a kernel module (CONFIG_WIREGUARD=m).
# Setting this parameter prevents any module from loading after boot.
# If applied, it must be set AFTER wireguard.ko is already in memory.
# Revisit once all required modules (WireGuard, Samba, BIND9) are confirmed
# stable at boot before this parameter takes effect.