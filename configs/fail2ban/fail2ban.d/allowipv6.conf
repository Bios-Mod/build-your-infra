# ============================================================
# Source  : /etc/fail2ban/fail2ban.d/allowipv6.conf
# Purpose : Override allowipv6 — suppress WARNING on every
#           fail2ban-client invocation (shipped commented out
#           in fail2ban.conf by default)
# Method  : fail2ban.d/ is the official override directory.
#           This file survives apt upgrade without any divert
#           or sed — fail2ban.conf is never modified.
# Apply   : sudo fail2ban-client reload
# ============================================================

[Definition]
allowipv6 = auto